<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootstrap Card Example</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light p-5">

<div class="container">

<div class="row g-4">

<!-- Normal Card -->
<div class="col-md-4">
<div class="card shadow">

<img src="https://images.unsplash.com/photo-1518770660439-4636190af475" 
class="card-img-top" alt="Technology">

<div class="card-body">
<h5 class="card-title">Technology</h5>

<p class="card-text">
This card shows an example of Bootstrap card component. 
You can use cards to display content like blog posts, products,
or portfolio projects.
</p>

<a href="#" class="btn btn-primary">Learn More</a>
</div>

</div>
</div>


<!-- Placeholder Card (Loading Skeleton) -->
<div class="col-md-4">
<div class="card" aria-hidden="true">

<img src="https://via.placeholder.com/400x200" class="card-img-top" alt="Loading">

<div class="card-body">

<h5 class="card-title placeholder-glow">
<span class="placeholder col-6"></span>
</h5>

<p class="card-text placeholder-glow">
<span class="placeholder col-7"></span>
<span class="placeholder col-4"></span>
<span class="placeholder col-4"></span>
<span class="placeholder col-6"></span>
<span class="placeholder col-8"></span>
</p>

<a class="btn btn-primary disabled placeholder col-6"></a>

</div>

</div>
</div>

</div>

</div>

</body>
</html>
