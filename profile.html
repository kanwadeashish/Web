<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card text-center shadow p-3" style="width: 18rem;">

        <img src="https://picsum.photos/150"
             class="rounded-circle mx-auto d-block mt-3"
             alt="Profile Image"
             width="120" height="120">
 
        <div class="card-body">
            <h5 class="card-title">Ashish</h5>
            <p class="card-text">Java Full Stack Developer</p>

            <div class="d-flex justify-content-center gap-2">
                <a href="#" class="btn btn-primary btn-sm">Follow</a>
                <a href="#" class="btn btn-outline-secondary btn-sm">Message</a>
            </div>
        </div>

    </div>

</body>
</html>
