<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Card</title>
<style>
body {
    font-family: Arial;
    background: #fafafa;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}
.product {
    border: 1px solid #ddd;
    padding: 15px;
    width: 220px;
    text-align: center;
    border-radius: 8px;
}
img {
    width: 100%;
}
button {
    background: orange;
    border: none;
    padding: 8px;
    color: white;
}
</style>
</head>
<body>

<div class="product">
    <img src="https://via.placeholder.com/200" alt="Product">
    <h3>Smart Watch</h3>
    <p>₹1999</p>
    <button>Buy Now</button>
</div>

</body>
</html>
