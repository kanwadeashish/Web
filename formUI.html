<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Form</title>
<style>
body {
    font-family: Arial;
    background: #e3f2fd;
    display: flex;
    justify-content: center;
    margin-top: 100px;
}
.form {
    background: white;
    padding: 20px;
    width: 250px;
    border-radius: 8px;
}
input {
    width: 100%;
    margin: 10px 0;
    padding: 8px;
}
button {
    width: 100%;
    padding: 8px;
    background: green;
    color: white;
    border: none;
}
</style>
</head>
<body>

<div class="form">
    <h3>Login</h3>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
</div>

</body>
</html>
