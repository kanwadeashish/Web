<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Card</title>
<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}
.card {
    background: white;
    padding: 20px;
    width: 250px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
img {
    width: 100px;
    border-radius: 50%;
}
button {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    background: blue;
    color: white;
    border-radius: 5px;
}
</style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/100" alt="Profile">
    <h2>Ashish</h2>
    <p>Java Full Stack Developer</p>
    <button>Follow</button>
</div>

</body>
</html>
