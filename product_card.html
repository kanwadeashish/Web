<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <style>
        body {
            font-family: Arial;
            background-color: #fce4ec;
            text-align: center;
        }
        .product {
            background: white;
            padding: 20px;
            width: 250px;
            margin: 50px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            background: #e91e63;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="product">
        <h2>Notebook</h2>
        <p>Price: ₹100</p>
        <button>Buy Now</button>
    </div>
</body>
</html>
